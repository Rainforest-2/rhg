name: Sync BCU library assets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-bcu-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout game repo
        uses: actions/checkout@v4
        with:
          path: game

      - name: Checkout upstream bcu-assets sparse
        uses: actions/checkout@v4
        with:
          repository: battlecatsultimate/bcu-assets
          ref: master
          path: upstream
          sparse-checkout: |
            fonts
            lang
          sparse-checkout-cone-mode: false

      - name: Sync selected assets
        run: |
          set -euo pipefail

          mkdir -p game/public/assets/bcu/fonts
          mkdir -p game/public/assets/bcu/lang

          rsync -a --delete upstream/fonts/ game/public/assets/bcu/fonts/
          rsync -a --delete upstream/BCU_lib/lang/ game/public/assets/bcu/lang/

          cd game

          cat > public/assets/bcu/BCU_ASSET_SYNC.md <<'EOF'
          # BCU synced assets

          Source repository:
          battlecatsultimate/bcu-assets

          Synced directories:
          - fonts -> public/assets/bcu/fonts
          - lang -> public/assets/bcu/lang

          This folder is consumed by the browser runtime.
          Do not edit synced files manually; update via the sync workflow.
          EOF

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          path: game
          branch: chore/sync-bcu-library-assets
          commit-message: Sync BCU fonts lang assets
          title: Sync BCU fonts, lang assets
          body: |
            Syncs selected assets from battlecatsultimate/bcu-assets.

            Included:
            - fonts
            - lang

            Runtime destination:
            - public/assets/bcu/fonts
            - public/assets/bcu/lang
