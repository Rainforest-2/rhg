name: Auto resolve conflicts and merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  resolve-and-merge:
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve conflicts by keeping PR changes
        id: resolve
        run: |
          set -euo pipefail

          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          BEFORE_MERGE_HEAD="$(git rev-parse HEAD)"

          git fetch origin "$BASE_BRANCH"

          set +e
          git merge "origin/$BASE_BRANCH" --no-edit
          MERGE_STATUS=$?
          set -e

          if [ "$MERGE_STATUS" = "0" ]; then
            AFTER_MERGE_HEAD="$(git rev-parse HEAD)"
            if [ "$BEFORE_MERGE_HEAD" != "$AFTER_MERGE_HEAD" ]; then
              echo "Merged origin/$BASE_BRANCH into $PR_BRANCH without conflicts. Pushing updated PR branch."
              git push origin "HEAD:$PR_BRANCH"
              echo "branch_updated=true" >> "$GITHUB_OUTPUT"
            else
              echo "No conflicts and PR branch already contained origin/$BASE_BRANCH."
              echo "branch_updated=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "Merge conflict detected. Keeping PR branch changes for conflicted paths."

          UNMERGED_FILES="$(git diff --name-only --diff-filter=U || true)"

          if [ -z "$UNMERGED_FILES" ]; then
            echo "Merge failed but no unmerged files were detected."
            git status --short
            exit 1
          fi

          echo "$UNMERGED_FILES" | while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi

            echo "Resolving conflicted path with PR version: $file"

            # In this workflow, the checked-out branch is the PR branch, and origin/$BASE_BRANCH
            # is being merged into it. Therefore --ours means "keep the PR branch version".
            if git checkout --ours -- "$file" 2>/dev/null; then
              git add -- "$file"
            else
              # Handles delete/modify and paths that do not have an --ours checkout candidate.
              git rm --ignore-unmatch -- "$file"
            fi
          done

          git add -A

          if [ -n "$(git ls-files -u)" ]; then
            echo "Unmerged files still remain after auto-resolution:"
            git ls-files -u
            exit 1
          fi

          # Important: even if the resolved tree is identical to the pre-merge PR tree,
          # a merge commit is still required to record origin/$BASE_BRANCH as merged.
          # Without this, GitHub keeps reporting mergeable=CONFLICTING / mergeStateStatus=DIRTY.
          if [ -f .git/MERGE_HEAD ]; then
            git commit -m "Auto resolve conflicts: keep PR changes"
            git push origin "HEAD:$PR_BRANCH"
            echo "branch_updated=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --cached --quiet; then
            echo "No staged changes and no merge in progress."
            echo "branch_updated=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Auto resolve conflicts: keep PR changes"
            git push origin "HEAD:$PR_BRANCH"
            echo "branch_updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for GitHub to update PR mergeability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Waiting for PR mergeability to update..."

          for i in $(seq 1 60); do
            MERGEABLE="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeable --jq '.mergeable')"
            MERGE_STATE="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeStateStatus --jq '.mergeStateStatus')"

            echo "Attempt $i: mergeable=$MERGEABLE mergeStateStatus=$MERGE_STATE"

            if [ "$MERGEABLE" = "MERGEABLE" ] || [ "$MERGE_STATE" = "CLEAN" ] || [ "$MERGE_STATE" = "UNSTABLE" ] || [ "$MERGE_STATE" = "HAS_HOOKS" ]; then
              exit 0
            fi

            if [ "$MERGEABLE" = "CONFLICTING" ] || [ "$MERGE_STATE" = "DIRTY" ]; then
              echo "PR is still reported as conflicting. Waiting for GitHub to refresh the pushed merge commit."
            fi

            sleep 5
          done

          echo "PR did not become mergeable in time."
          gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeable,mergeStateStatus
          exit 1

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_URL" --squash --delete-branch --admin
