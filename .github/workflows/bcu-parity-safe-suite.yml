name: BCU parity safe suite

on:
  push:
  pull_request:

jobs:
  bcu-parity-safe-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run BCU parity safe suite
        run: node scripts/check-bcu-ability-parity-safe-suite.mjs
