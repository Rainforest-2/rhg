name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/configure-pages@v5

      # Build the Vite bundle. This is what Pages publishes: dist/ contains the
      # hashed entry/CSS chunks plus the selected public/assets the vite plugin
      # copies in (raw public/assets/bcu sources are excluded by the plugin, so
      # the artifact never carries them). The whole app is served under /rhg/
      # because vite.config.js sets base: '/rhg/'.
      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      # Keep the published JS as the Vite output. Battle runtime responsiveness is more
      # important than client-side obfuscation, so Pages no longer runs
      # javascript-obfuscator, anti-debug, or self-defending transforms over the chunks.
      # A small copyright banner is still prepended to shipped JS files.
      - name: Add copyright banner
        run: |
          BANNER='/*! ワンコ大戦争 (rhg) — © 2026 RHgrive. All Rights Reserved. 無断複製・再配布・流用を禁じます / Unauthorized copying, rehosting or reuse is prohibited. */'
          find dist/assets -name '*.js' -print0 | while IFS= read -r -d '' f; do
            printf '%s\n' "$BANNER" | cat - "$f" > "$f.__b" && mv "$f.__b" "$f"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
