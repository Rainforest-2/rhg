name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check and test
        shell: bash
        run: |
          mkdir -p tmp/character-modification-ui
          set -o pipefail
          npm run verify 2>&1 | tee tmp/character-modification-ui/verify.log

      - name: Run status editor visual contract
        if: always()
        shell: bash
        run: |
          set -o pipefail
          node --test tests/character-modification-design-browser.test.mjs \
            2>&1 | tee tmp/character-modification-ui/status-editor-visual-contract.log

      - name: Build
        run: npm run build

      - name: Upload UI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: character-modification-ui
          path: tmp/character-modification-ui
          if-no-files-found: error
