name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check and test
        run: npm run verify

      - name: Build
        run: npm run build

      - name: Upload UI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: character-modification-ui
          path: tmp/character-modification-ui
          if-no-files-found: ignore
