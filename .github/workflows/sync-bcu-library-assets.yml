name: Replace BCU 000003 assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "000003.asset.converted.zip"
      - ".github/workflows/replace-bcu-000003.yml"

permissions:
  contents: write

jobs:
  replace-bcu-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Replace public/assets/bcu/000003 with zip contents
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="000003.asset.converted.zip"
          TARGET_DIR="public/assets/bcu/000003"
          TMP_DIR="$(mktemp -d)"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "::error::$ZIP_FILE が見つかりません"
            exit 1
          fi

          unzip -q "$ZIP_FILE" -d "$TMP_DIR"

          # macOS由来の不要ファイルがあれば削除
          find "$TMP_DIR" -name "__MACOSX" -type d -prune -exec rm -rf {} +
          find "$TMP_DIR" -name ".DS_Store" -type f -delete

          rm -rf "$TARGET_DIR"
          mkdir -p "$TARGET_DIR"

          # ZIPの中身が「単一フォルダ」なら、そのフォルダの中身だけを配置する
          mapfile -t entries < <(find "$TMP_DIR" -mindepth 1 -maxdepth 1)

          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            rsync -a --delete "${entries[0]}/" "$TARGET_DIR/"
          else
            rsync -a --delete "$TMP_DIR/" "$TARGET_DIR/"
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/assets/bcu/000003

          if git diff --cached --quiet; then
            echo "変更がないためコミットしません"
            exit 0
          fi

          git commit -m "Replace BCU 000003 assets from converted zip"
          git push
