<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- interactive-widget=resizes-visual: when the software keyboard opens for a
       search field, Android Chrome must not squash the 100dvh game layout —
       the browser pans the visual viewport to the focused input instead. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual" />
  <meta name="copyright" content="© 2026 RHgrive. All Rights Reserved." />
  <meta name="author" content="RHgrive" />
  <meta name="robots" content="noarchive, noimageindex" />
  <meta name="theme-color" content="#0b111a" />
  <meta name="application-name" content="Wan Battle" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Wan Battle" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- © 2026 RHgrive. All Rights Reserved. Unauthorized copying, rehosting, or
       reuse of this site or its source is prohibited. 無断複製・再配布・流用を禁じます。 -->
  <title>Wan Battle - BCU Preview</title>
  <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
  <link rel="icon" type="image/png" href="./assets/ui/game-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/ui/apple-touch-icon.png" />
  <!-- Tuning-overlay brush fonts use font-display:block; preload so the first
       long-press open never shows invisible text while they stream in. -->
  <link rel="preload" as="font" type="font/otf" crossorigin="anonymous" href="./assets/FOT-%E5%A4%A7%E6%B1%9F%E6%88%B8%E5%8B%98%E4%BA%AD%E6%B5%81%20Std%20E.otf" />
  <link rel="preload" as="font" type="font/ttf" crossorigin="anonymous" href="./assets/%E7%99%BD%E8%88%9F%E8%A1%8C%E6%9B%B8%E6%95%99%E6%BC%A2.ttf" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/loading-overlay.css" />
  <link rel="stylesheet" href="./css/ui-polish.css" />
  <link rel="stylesheet" href="./css/nyanko-nonbattle-polish.css" />
  <link rel="stylesheet" href="./css/nyanko-formation-card-fix.css" />
  <link rel="stylesheet" href="./css/nyanko-formation-layout-refine.css" />
  <link rel="stylesheet" href="./css/stage-selector-fix.css" />
  <link rel="stylesheet" href="./css/nyanko-stage-selector-fix.css" />
  <link rel="stylesheet" href="./css/bcu-battle-ui-fix.css" />
  <link rel="stylesheet" href="./css/touch-fix.css" />
  <link rel="stylesheet" href="./css/android-stage-scroll-fix.css" />
  <link rel="stylesheet" href="./css/nyanko-stage-selector-game-ui.css" />
  <link rel="stylesheet" href="./css/nyanko-loading-background-fix.css" />
  <link rel="stylesheet" href="./css/nyanko-stage-selector-photo-ui.css" />
  <!-- Bootstrap Icons (icon font) — provides the settings gear and the Discord
       glyph for the settings UI. Vendored locally (v1.11.3) so the icons work
       offline, and we load only the Bootstrap Icons stylesheet, not the full
       Bootstrap framework CSS, so Bootstrap's global Reboot does not restyle/break
       the existing game UI. -->
  <link rel="stylesheet" href="./assets/vendor/bootstrap-icons/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="./css/game-settings.css" />
  <!-- Short, wide phone-landscape fixes (map toolbar reflow + overlay trims).
       Loaded after the stage-selector sheets so its !important rules win, and
       before premium-polish so premium stays the last stylesheet. -->
  <link rel="stylesheet" href="./css/mobile-landscape-fit.css" />
  <!-- Portrait-phone layout for the non-battle screens (formation / stage
       selector / settings). Same cascade slot rationale as the landscape
       sheet: after the stage-selector sheets, before premium polish. -->
  <link rel="stylesheet" href="./css/mobile-portrait-fit.css" />
  <link rel="stylesheet" href="./css/community-home.css" />
  <!-- Premium polish stays the last local stylesheet so its equal-specificity
       motion rules win (see scripts/check-formation-premium-motion.mjs). -->
  <link rel="stylesheet" href="./css/nyanko-premium-polish.css" />
</head>
<body>
  <div class="app-shell game-shell">
    <main class="game-stage">
      <section class="canvas-panel">
        <canvas id="preview-canvas" aria-label="Wanko battle canvas"></canvas>
      </section>
    </main>
    <aside id="control-panel" class="control-panel dev-panel is-hidden" hidden></aside>
    <section id="log-panel" class="log-panel dev-log is-hidden" hidden>
      <header>Logs</header>
      <div id="log-list" class="log-list"></div>
    </section>
  </div>
  <script type="module" src="./js/install-gate.js"></script>
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/pwa.js"></script>
</body>
</html>
